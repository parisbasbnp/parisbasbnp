<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afficher un RIB</title>

<style>
*{
 box-sizing:border-box;
 font-family:Arial,sans-serif;
}

body{
 margin:0;
 background:#f5f6f7;
 color:#222;
}

.header{
 background:#008542;
 color:white;
 height:65px;
 display:flex;
 align-items:center;
 padding:0 20px;
 font-size:20px;
 font-weight:bold;
}

.back{
 font-size:30px;
 margin-right:20px;
}

.container{
 padding:20px;
}

.card{
 background:white;
 border-radius:18px;
 padding:20px;
 box-shadow:0 3px 10px #ddd;
 margin-bottom:20px;
}

.title{
 font-size:18px;
 font-weight:bold;
 margin-bottom:20px;
}

.row{
 margin-bottom:18px;
}

.label{
 color:#777;
 font-size:14px;
}

.value{
 font-size:16px;
 font-weight:bold;
 margin-top:5px;
 word-break:break-all;
}

button{
 width:100%;
 border:0;
 padding:14px;
 border-radius:12px;
 background:#008542;
 color:white;
 font-size:16px;
 margin-top:10px;
}
 .back{
 font-size:30px;
 margin-right:20px;
 color:white;
 text-decoration:none;
}

</style>
</head>

<body>

<div class="header">
<a href="client.html" class="back">‹</a>
Afficher un RIB
</div>


<div class="container">

<div class="card">

<div class="title">
Relevé d'Identité Bancaire
</div>


<div class="row">
<div class="label">Titulaire du compte</div>
<div class="value">
 RICHARD LEBLOND
</div>
</div>


<div class="row">
<div class="label">IBAN</div>
<div class="value">
FR76 **** **** **** **** **** ***
</div>
</div>


<div class="row">
<div class="label">BIC</div>
<div class="value">
********
</div>
</div>


<div class="row">
<div class="label">Domiciliation</div>
<div class="value">
Agence bancaire principale
</div>
</div>


<button>
Copier les coordonnées
</button>

<button>
Partager mon RIB
</button>


</div>

</div>


</body>
</html>
