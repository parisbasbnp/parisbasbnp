<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paiement mobile</title>

<style>
*{
 box-sizing:border-box;
 font-family:Arial,sans-serif;
}

body{
 margin:0;
 background:#f5f6f7;
 color:#222;
}

.header{
 background:#008542;
 color:white;
 height:65px;
 display:flex;
 align-items:center;
 padding:0 20px;
 font-size:20px;
 font-weight:bold;
}

.back{
 font-size:30px;
 margin-right:20px;
 color:white;
 text-decoration:none;
}

.container{
 padding:20px;
}

.card{
 background:white;
 border-radius:18px;
 padding:20px;
 margin-bottom:15px;
 box-shadow:0 3px 10px #ddd;
 display:flex;
 align-items:center;
 gap:15px;
}

.icon{
 width:50px;
 height:50px;
 border-radius:50%;
 background:#e8f5ee;
 display:flex;
 align-items:center;
 justify-content:center;
 color:#008542;
 font-size:22px;
}

.text h3{
 margin:0;
 font-size:17px;
}

.text p{
 margin:5px 0 0;
 color:#777;
 font-size:14px;
}

</style>

</head>

<body>


<div class="header">
<a href="paiement.html" class="back">‹</a>
Paiement mobile
</div>


<div class="container">


<div class="card">

<div class="icon">
<i class="fa-solid fa-mobile-screen"></i>
</div>

<div class="text">
<h3>Payer avec votre mobile</h3>
<p>Effectuez vos paiements rapidement et en sécurité</p>
</div>

</div>



<div class="card">

<div class="icon">
<i class="fa-solid fa-qrcode"></i>
</div>

<div class="text">
<h3>Payer par QR code</h3>
<p>Scannez un QR code pour régler un achat</p>
</div>

</div>



<div class="card">

<div class="icon">
<i class="fa-solid fa-credit-card"></i>
</div>

<div class="text">
<h3>Cartes enregistrées</h3>
<p>Gérez vos moyens de paiement mobile</p>
</div>

</div>


</div>


</body>
</html>
