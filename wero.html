<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envoyer avec Wero</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#00884a;
    color:white;
    padding:50px 20px 25px;
    display:flex;
    align-items:center;
    gap:15px;
}

.container{
    padding:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:8px;
    font-weight:bold;
}

input{
    width:100%;
    height:55px;
    border:1px solid #ddd;
    border-radius:14px;
    padding:0 15px;
    font-size:16px;
    outline:none;
}

.btn{
    width:100%;
    height:55px;
    margin-top:30px;
    border:none;
    border-radius:14px;
    background:#00884a;
    color:white;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    <i class="fa-solid fa-arrow-left" onclick="history.back()"></i>
    <h1>Envoyer avec Wero</h1>
</header>

<div class="container">

<div class="card">

<label>Numéro ou e-mail</label>
<input type="text" placeholder="Téléphone ou e-mail">

<label>Montant</label>
<input type="number" placeholder="0,00 €">

<label>Message</label>
<input type="text" placeholder="Ajouter un message">

<button class="btn">
Continuer
</button>

</div>

</div>

</body>
</html>
