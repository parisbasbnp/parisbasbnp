<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirmation virement</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{
    margin:0;
    background:#f5f6f7;
    color:#222;
}



.header{

    height:65px;
    background:#008542;
    color:white;
    display:flex;
    align-items:center;
    padding:0 20px;
    font-size:20px;
    font-weight:bold;

}


.back{

    color:white;
    text-decoration:none;
    font-size:30px;
    margin-right:15px;

}



.card{

    background:white;
    margin:20px;
    padding:20px;
    border-radius:18px;
    box-shadow:0 3px 10px #ddd;

}



h2{

    margin-top:0;

}



.detail{

    margin-bottom:18px;

}



.label{

    color:#777;
    font-size:14px;

}



.value{

    font-size:16px;
    font-weight:bold;
    margin-top:5px;
    word-break:break-all;

}



button{

    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background:#008542;
    color:white;
    font-size:16px;
    font-weight:bold;

}



/* Notifications */

.notification{

    position:fixed;
    top:-150px;
    left:20px;
    right:20px;
    background:white;
    padding:18px;
    border-radius:18px;
    box-shadow:0 5px 20px #aaa;
    text-align:center;
    transition:0.5s;
    z-index:10;

}



.notification.show{

    top:20px;

}



/* Cercle chargement */


.loader{

    width:35px;
    height:35px;
    border:4px solid #ddd;
    border-top:4px solid #008542;
    border-radius:50%;
    margin:auto;
    animation:tourner 1s linear infinite;

}



@keyframes tourner{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }

}


</style>


</head>


<body>


<div class="header">

<a href="virement.html" class="back">
‹
</a>

Confirmation du virement

</div>



<div class="card">


<h2>
Détails du virement
</h2>



<div class="detail">

<div class="label">
Compte débité
</div>

<div class="value" id="compte"></div>

</div>




<div class="detail">

<div class="label">
Bénéficiaire
</div>

<div class="value" id="beneficiaire"></div>

</div>




<div class="detail">

<div class="label">
IBAN
</div>

<div class="value" id="iban"></div>

</div>




<div class="detail">

<div class="label">
Montant
</div>

<div class="value">
<span id="montant"></span> €
</div>

</div>




<div class="detail">

<div class="label">
Motif
</div>

<div class="value" id="motif"></div>

</div>




<button onclick="confirmer()">

Confirmer le virement

</button>



</div>




<!-- Confirmation en cours -->

<div class="notification" id="chargement">

<div class="loader"></div>

<br>

Confirmation en cours...

</div>




<!-- Message succès -->

<div class="notification" id="notification">

<b>
Virement effectué avec succès
</b>

<br><br>

Votre virement vers 
<b id="notifNom"></b>

a été effectué.

<br>

Montant :
<b id="notifMontant"></b> €

</div>




<script>


let compte =
localStorage.getItem("compte");


let beneficiaire =
localStorage.getItem("beneficiaire");


let iban =
localStorage.getItem("iban");


let montant =
localStorage.getItem("montant");


let motif =
localStorage.getItem("motif");



document.getElementById("compte").innerHTML =
compte==="cheque"
? "Compte de chèques ••••1749"
: "Compte joint ••••7890";


document.getElementById("beneficiaire").innerHTML =
beneficiaire;


document.getElementById("iban").innerHTML =
iban;


document.getElementById("montant").innerHTML =
montant;


document.getElementById("motif").innerHTML =
motif;





function confirmer(){


let chargement =
document.getElementById("chargement");


let notification =
document.getElementById("notification");



// étape chargement 4 secondes

chargement.classList.add("show");



setTimeout(function(){


chargement.classList.remove("show");


// préparer message

document.getElementById("notifNom").innerHTML =
beneficiaire;


document.getElementById("notifMontant").innerHTML =
montant;



notification.classList.add("show");

let notifications = JSON.parse(localStorage.getItem("notifications")) || [];

notifications.unshift({

    titre: "Virement effectué",

    message: "Votre virement vers " + beneficiaire + " a été effectué avec succès.",

    montant: montant + " €",

    date: new Date().toLocaleDateString("fr-FR"),

    heure: new Date().toLocaleTimeString("fr-FR")

});

localStorage.setItem(

    "notifications",

    JSON.stringify(notifications)

);
    
let historiques = JSON.parse(
    localStorage.getItem("historiques")
) || [];

historiques.unshift({

    type: "Virement envoyé",

    beneficiaire: beneficiaire,

    montant: montant + " €",

    iban: iban,

    motif: motif,

    date: new Date().toLocaleDateString("fr-FR"),

    heure: new Date().toLocaleTimeString("fr-FR")

});

localStorage.setItem(
    "historiques",
    JSON.stringify(historiques)
);    

// disparition après 4 secondes

setTimeout(function(){

notification.classList.remove("show");

},4000);



},4000);



}



</script>


</body>

</html>
