<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Total de vos comptes</title>

<style>
*{
 box-sizing:border-box;
 font-family:Arial,sans-serif;
}

body{
 margin:0;
 background:#f5f6f7;
 color:#222;
}

.header{
 background:#008542;
 color:white;
 height:65px;
 display:flex;
 align-items:center;
 padding:0 20px;
 font-size:20px;
 font-weight:bold;
}

.back{
 font-size:30px;
 margin-right:20px;
 color:white;
 text-decoration:none;
}

.container{
 padding:20px;
}

.card{
 background:white;
 border-radius:18px;
 padding:20px;
 margin-bottom:15px;
 box-shadow:0 3px 10px #ddd;
}

.total{
 text-align:center;
}

.total h2{
 font-size:16px;
 color:#777;
}

.total p{
 font-size:32px;
 font-weight:bold;
 color:#008542;
}

.name{
 font-size:18px;
 font-weight:bold;
}

.balance{
 font-size:22px;
 margin-top:10px;
}

small{
 color:#777;
}

</style>
</head>

<body>

<div class="header">
<a href="index.html" class="back">‹</a>
Total de vos comptes
</div>


<div class="container">


<div class="card total">

<h2>Total disponible</h2>

<p>12 450,00 €</p>

</div>



<div class="card">

<div class="name">
Compte de chèques
</div>

<div class="balance">
8 250,00 €
</div>

<small>
Solde disponible
</small>

</div>



<div class="card">

<div class="name">
Compte joint
</div>

<div class="balance">
3 500,00 €
</div>

<small>
Solde disponible
</small>

</div>



<div class="card">

<div class="name">
Livret A
</div>

<div class="balance">
700,00 €
</div>

<small>
Épargne disponible
</small>

</div>


</div>

</body>
</html>
